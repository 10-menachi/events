services:
  event-postgres:
    image: postgres:17
    container_name: event-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_password
      POSTGRES_DB: events
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
